name: Build Debian Package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container: ubuntu:20.04

    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            wget curl git make cmake ninja-build clang pkg-config \
            build-essential libgtk-3-dev liblzma-dev libglu1-mesa \
            debhelper fakeroot golang-go file unzip zip xz-utils \
            libappindicator3-dev ca-certificates

      - name: Rewrite SSH submodule URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          submodules: recursive

      - name: Install Go 1.25 (bootstrap for tailscale-go)
        run: |
          wget -q https://go.dev/dl/go1.25.6.linux-amd64.tar.gz
          tar -xf go1.25.6.linux-amd64.tar.gz -C /usr/local
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Install tailscale-go toolchain
        run: |
          export PATH="/usr/local/go/bin:$PATH"
          GO_COMMIT_ID=$(cat tailscale/go.toolchain.rev)
          mkdir -p /root/.cache
          cd /root/.cache && git clone https://github.com/tailscale/go.git
          cd /root/.cache/go && git checkout ${GO_COMMIT_ID}
          cd /root/.cache/go/src && ./make.bash
          mv /root/.cache/go /root/.cache/tailscale-go
          echo "${GO_COMMIT_ID}" > /root/.cache/tailscale-go.extracted
          echo "/root/.cache/tailscale-go/bin" >> $GITHUB_PATH

      - name: Install Flutter
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
          tar -xf flutter_linux_3.41.4-stable.tar.xz -C /root
          git config --global --add safe.directory /root/flutter
          echo "/root/flutter/bin" >> $GITHUB_PATH

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate config
        run: make config

      - name: Build Debian package
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cylonix-deb
          path: build/linux/x64/release/cylonix*.deb
          retention-days: 30
